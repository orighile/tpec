name: Build Check (Development)

on:
  push:
    branches-ignore: [ main, master ]  # Run on all branches except main/master
  pull_request:
    branches: [ main, master ]

jobs:
  build-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run type checking
      run: npx tsc --noEmit
      
    - name: Run linting
      run: npx eslint .
      continue-on-error: true
      
    - name: Test build process
      run: npm run build
      env:
        NODE_ENV: production
        
    - name: Verify build output
      run: |
        echo "Build completed successfully!"
        echo "Checking dist folder contents:"
        ls -la dist/
        echo "Build size:"
        du -sh dist/
        
    - name: Comment on PR (if applicable)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Build check passed! The application builds successfully and is ready for deployment.'
          })